{% extends "core/base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-danger text-white">
            <h4>🗑 Eliminar Orden (Solo Superusuario)</h4>
        </div>
        <div class="card-body">
            <p class="text-danger">
                <strong>Advertencia:</strong> Esta acción es irreversible.<br>
                Solo se pueden eliminar órdenes que estén en estado <strong>Completado</strong>.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">ID de la Orden</label>
                    <input type="number" name="orden_id" class="form-control" placeholder="Ej: 63" required autofocus>
                </div>
                <button type="submit" class="btn btn-danger">Eliminar Orden</button>
                <a href="{% url 'gestion_estados' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
