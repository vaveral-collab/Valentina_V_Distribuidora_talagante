server {
    listen 80;
    server_name distribuidoratalagante.cloud www.distribuidoratalagante.cloud;

    # Static files (CSS, JS, etc.)
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Media files (imágenes de productos, comprobantes, etc.)
    location /media/ {
        alias /media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Todo lo demás va a Django
    location / {
        proxy_pass http://distribuidora-django-v2:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
